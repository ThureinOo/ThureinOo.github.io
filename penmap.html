}
function updateTargetStatus(id,status){
  var tgt=S.targets.find(function(t){return t.id===id;});
  if(tgt){tgt.status=status;save();renderAttackPath();renderMapPanel();}
}
function removeTarget(id){
  S.targets=S.targets.filter(function(t){return t.id!==id;});
  S.attackPath=S.attackPath.filter(function(s){return s.targetId!==id;});
  save();renderAttackPath();renderMapPanel();
}
function addStep(){
  if(!S.targets.length){alert('Add a target first.');return;}
  var targetId=document.getElementById('step-target').value;
  var phase=document.getElementById('step-phase').value;
  var tool=document.getElementById('step-tool').value;
  var result=document.getElementById('step-result').value;
  var creds=document.getElementById('step-creds').value;
  var editId=document.getElementById('step-edit-id').value;
  if(!tool){alert('Tool/command is required.');return;}
  var tgt=S.targets.find(function(t){return t.id===parseInt(targetId);});
  var source=tgt?(tgt.hostname||tgt.name||tgt.ip):'Unknown';
  if(editId){
    // Edit existing step
    var step=S.attackPath.find(function(s){return s.id===parseInt(editId);});
    if(step){step.targetId=parseInt(targetId);step.phase=phase;step.tool=tool;step.result=result;step.credsFound=creds;}
  } else {
    S.attackPath.push({id:Date.now(),targetId:parseInt(targetId),phase:phase,tool:tool,result:result,credsFound:creds});
  }
  if(creds)autoCollectCred(creds,source);
  save();renderAttackPath();
}
function removeStep(id){
  S.attackPath=S.attackPath.filter(function(s){return s.id!==id;});
  save();renderAttackPath();
}
function exportAttackPath(){
  var md='# Attack Path Report\n\n';
  md+='## Targets\n';
  S.targets.forEach(function(tgt){
    md+='- **'+tgt.hostname+'** ('+tgt.ip+') - '+tgt.os+' - Status: '+tgt.status+'\n';
    if(tgt.creds) md+='  - Creds: '+tgt.creds+'\n';
    if(tgt.notes) md+='  - Notes: '+tgt.notes+'\n';
  });
  md+='\n## Attack Steps\n';
  S.attackPath.forEach(function(step,i){
    var tgt=S.targets.find(function(t){return t.id===step.targetId;});
    var tname=tgt?tgt.hostname:'Unknown';
    md+='\n### Step '+(i+1)+': '+step.phase+'\n';
    md+='- **Target:** '+tname+'\n';
    md+='- **Tool:** '+step.tool+'\n';
    if(step.result) md+='- **Result:** '+step.result+'\n';
    if(step.credsFound) md+='- **Credentials Found:** '+step.credsFound+'\n';
  });
  var blob=new Blob([md],{type:'text/markdown'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='attack-path-'+(S.ip||'report')+'.md';a.click();
}

function updateTargetFlag(id,field,value){

function editStep(id){
  var step=S.attackPath.find(function(s){return s.id===id;});
  if(!step)return;
  document.getElementById('step-target').value=step.targetId;
  document.getElementById('step-phase').value=step.phase;
  document.getElementById('step-tool').value=step.tool;
  document.getElementById('step-result').value=step.result||'';
  document.getElementById('step-creds').value=step.credsFound||'';
  document.getElementById('step-edit-id').value=id;
  document.getElementById('stepFormTitle').textContent='Edit Step';
  document.getElementById('stepCancelEdit').style.display='';
  document.getElementById('stepFormContainer').scrollIntoView({behavior:'smooth'});
}

// Drag reorder steps
var dragStepId=null;
function stepDragStart(e,id){dragStepId=id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function stepDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function stepDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function stepDragEnd(e){e.target.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(function(el){el.classList.remove('drag-over');});}
function stepDrop(e,targetId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragStepId===targetId)return;
  var fromIdx=S.attackPath.findIndex(function(s){return s.id===dragStepId;});
  var toIdx=S.attackPath.findIndex(function(s){return s.id===targetId;});
  if(fromIdx===-1||toIdx===-1)return;
  var item=S.attackPath.splice(fromIdx,1)[0];
  S.attackPath.splice(toIdx,0,item);
  dragStepId=null;save();renderAttackPath();
}

function cancelEditStep(){
  document.getElementById('step-edit-id').value='';

  document.getElementById('step-result').value='';

  document.getElementById('stepFormTitle').textContent='Add Step';

}

  }

// Paste image handler
document.getElementById('notesContent').addEventListener('paste', function(e) {
  var items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      var blob = items[i].getAsFile();
      var reader = new FileReader();
      reader.onload = function(event) {
        var img = document.createElement('img');
        img.src = event.target.result;
        var sel = window.getSelection();
        if (sel.rangeCount) {
          var range = sel.getRangeAt(0);
          range.deleteContents();
          range.insertNode(img);
          range.collapse(false);
        } else {
          document.getElementById('notesContent').appendChild(img);
        }
        // Save after paste
        localStorage.setItem('penmap-notes', document.getElementById('notesContent').innerHTML);
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});

    alert('No notes to export.');
    return;
  }

  var filename = 'pentest-notes-' + (S.ip || 'exam') + '-' + new Date().toISOString().split('T')[0];

  if (format === 'md') {
    // Convert to markdown-ish (images become base64 markdown)
    var md = html
      .replace(/<img[^>]*src="([^"]*)"[^>]*>/gi, function(m, src) { return '\n![screenshot](' + src + ')\n'; })
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<\/div>/gi, '\n')
      .replace(/<\/p>/gi, '\n\n')
      .replace(/<[^>]+>/g, '')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/\n{3,}/g, '\n\n')
      .trim();

// Resize handle

// Map rendering
function depthOf(t){
  var d=0,c=t,seen={};
  while(c&&c.reachableVia){
    if(seen[c.id])break;seen[c.id]=true;d++;
    c=S.targets.find(function(x){return String(x.id)===String(c.reachableVia);});
    if(!c)break;
  }
  return d;
}
function targetsByDepth(){
  var g={};
  S.targets.forEach(function(t){var d=depthOf(t);if(!g[d])g[d]=[];g[d].push(t);});
  return g;
}

var zoneColors=['rgba(0,212,255,0.04)','rgba(124,58,237,0.04)','rgba(16,185,129,0.04)','rgba(245,158,11,0.04)','rgba(239,68,68,0.04)'];
var zoneBorderColors=['rgba(0,212,255,0.25)','rgba(124,58,237,0.25)','rgba(16,185,129,0.25)','rgba(245,158,11,0.25)','rgba(239,68,68,0.25)'];

function renderMapPanel(){
  if(!mapPanelOpen)return;
  var body=document.getElementById('mapPanelBody');
  var svg=document.getElementById('mapPanelSvg');
  // Remove old canvas if exists
  var oldCanvas=body.querySelector('.mp-canvas');
  if(oldCanvas)oldCanvas.remove();

  if(!S.targets.length){
    svg.innerHTML='';svg.style.width='0';svg.style.height='0';
    body.style.minHeight='200px';
    if(!body.querySelector('.mp-empty')){
      var empty=document.createElement('div');
      empty.className='mp-empty';
      empty.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:12px;text-align:center';
      empty.innerHTML='No targets added yet.<br>Add targets in Phase 15 (Loot & Attack Path).';
      body.appendChild(empty);
    }
    return;
  }
  var existingEmpty=body.querySelector('.mp-empty');
  if(existingEmpty)existingEmpty.remove();

  // Create canvas container for centering in fullscreen
  var canvas=document.createElement('div');
  canvas.className='mp-canvas';
  canvas.style.position='relative';

  var NODE_W=110,NODE_H=80,GAP_X=24,GAP_Y=90,PAD=30,MAX_ROW=3,ZONE_PAD=16,GROUP_GAP=30;
  var groups=targetsByDepth();
  var maxD=Math.max.apply(null,Object.keys(groups).map(Number));
  var positions={};
  var zones=[];

  // Calculate sub-groups per depth (group by pivot parent)
  function getSubGroups(d){
    var hosts=groups[d]||[];
    if(d===0) return [{parentId:null,label:'External Network',hosts:hosts,subnet:''}];
    var map={};
    hosts.forEach(function(h){
      var pid=String(h.reachableVia||'direct');
      if(!map[pid])map[pid]={parentId:h.reachableVia,hosts:[],subnets:{}};
      map[pid].hosts.push(h);
      if(h.subnet)map[pid].subnets[h.subnet]=true;
    });
    return Object.keys(map).map(function(k){
      var g=map[k];
      var parent=S.targets.find(function(x){return String(x.id)===String(g.parentId);});
      var parentName=parent?(parent.hostname||parent.name):'?';
      var subnet=Object.keys(g.subnets).join(', ');
      return {parentId:g.parentId,label:'via '+parentName+(subnet?' \u2014 '+subnet:''),hosts:g.hosts,subnet:subnet};
    });
  }

  // First pass: determine total width needed
  var allTierSGs={};
  var globalMaxWidth=0;
  for(var d=0;d<=maxD;d++){
    var sgs=getSubGroups(d);
    var tierW=0;
    sgs.forEach(function(sg,si){
      var cols=Math.min(sg.hosts.length,MAX_ROW);
      sg._cols=cols;
      sg._rows=Math.ceil(sg.hosts.length/MAX_ROW);
      sg._width=cols*(NODE_W+GAP_X)-GAP_X+ZONE_PAD*2;
      tierW+=sg._width;
      if(si<sgs.length-1)tierW+=GROUP_GAP;
    });
    if(tierW>globalMaxWidth)globalMaxWidth=tierW;
    allTierSGs[d]=sgs;
  }

  var totalWidth=Math.max(globalMaxWidth+PAD*2,320);
  var attackerX=totalWidth/2-NODE_W/2;
  var attackerY=PAD;
  var currentY=attackerY+NODE_H+GAP_Y;
  var maxX=attackerX+NODE_W,maxY=attackerY+NODE_H;
  var colorIdx=0;

  for(var d2=0;d2<=maxD;d2++){
    var sgs2=allTierSGs[d2];
    if(!sgs2||!sgs2.length||sgs2.every(function(sg){return !sg.hosts.length;}))continue;

    var totalSgWidth=0;
    sgs2.forEach(function(sg,si){totalSgWidth+=sg._width;if(si<sgs2.length-1)totalSgWidth+=GROUP_GAP;});
    var maxRows=Math.max.apply(null,sgs2.map(function(sg){return sg._rows;}));
    var tierHeight=maxRows*(NODE_H+16);
    var sgStartX=Math.max(PAD,totalWidth/2-totalSgWidth/2);

    sgs2.forEach(function(sg,si){
      var zoneX=sgStartX;
      var zoneY=currentY-18;
      var zoneW=sg._width;
      var zoneH=tierHeight+ZONE_PAD*2+18;
      zones.push({x:zoneX,y:zoneY,w:zoneW,h:zoneH,label:d2===0?'External Network':'Hop '+d2+': '+sg.label,colorIdx:d2===0?0:colorIdx+1});

      var innerX=zoneX+ZONE_PAD;
      var innerY=currentY;
      sg.hosts.forEach(function(h,hi){
        var row=Math.floor(hi/MAX_ROW);
        var col=hi%MAX_ROW;
        var x=innerX+col*(NODE_W+GAP_X);
        var y=innerY+row*(NODE_H+16);
        positions[h.id]={x:x,y:y};
        if(x+NODE_W>maxX)maxX=x+NODE_W;
        if(y+NODE_H>maxY)maxY=y+NODE_H;
      });
      sgStartX+=sg._width+GROUP_GAP;
      if(d2>0)colorIdx++;
    });
    currentY+=tierHeight+ZONE_PAD*2+18+GAP_Y;
  }

  var svgW=maxX+PAD;
  var svgH=maxY+PAD+30;
  canvas.style.width=svgW+'px';
  canvas.style.height=svgH+'px';

  // Move SVG into canvas
  svg.style.width=svgW+'px';
  svg.style.height=svgH+'px';
  svg.setAttribute('width',svgW);
  svg.setAttribute('height',svgH);

  // Draw SVG: zones + connections
  var svgContent='';

  // Zone boundaries
  zones.forEach(function(z){
    var ci=z.colorIdx%zoneColors.length;
    svgContent+='<rect x="'+z.x+'" y="'+z.y+'" width="'+z.w+'" height="'+z.h+'" rx="10" fill="'+zoneColors[ci]+'" stroke="'+zoneBorderColors[ci]+'" stroke-width="1" stroke-dasharray="5,4"/>';
    svgContent+='<text x="'+(z.x+8)+'" y="'+(z.y+12)+'" fill="var(--muted)" font-size="9" font-family="sans-serif">'+z.label+'</text>';
  });

  function drawLine(x1,y1,x2,y2,owned,label){
    var style=owned?'stroke:var(--green);stroke-width:2.5':'stroke:var(--border);stroke-width:1.5';
    var pathClass=owned?'conn-owned':'conn-active';
    var dy=y2-y1;var cy1=y1+dy*0.4;var cy2=y2-dy*0.4;
    svgContent+='<path class="'+pathClass+'" d="M'+x1+','+y1+' C'+x1+','+cy1+' '+x2+','+cy2+' '+x2+','+(y2-6)+'" style="'+style+';fill:none"/>';
    svgContent+='<polygon points="'+(x2-3)+','+(y2-10)+' '+(x2+3)+','+(y2-10)+' '+x2+','+(y2-3)+'" style="fill:'+(owned?'var(--green)':'var(--border)')+'"/>';
    if(label){
      var lx=(x1+x2)/2,ly=(y1+y2)/2;
      var tw=label.length*5+8;
      svgContent+='<rect x="'+(lx-tw/2)+'" y="'+(ly-7)+'" width="'+tw+'" height="14" rx="3" fill="var(--surface)"/>';
      svgContent+='<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="middle" fill="var(--orange)" font-size="9" font-family="monospace">'+label+'</text>';
    }
  }

  // Attacker → depth 0
  (groups[0]||[]).forEach(function(h){
    var p=positions[h.id];if(!p)return;
    var owned=h.status!=='not-started'&&h.status!=='recon';
    drawLine(attackerX+NODE_W/2,attackerY+NODE_H,p.x+NODE_W/2,p.y,owned,null);
  });
  // Parent → child
  for(var dd=1;dd<=maxD;dd++){
    (groups[dd]||[]).forEach(function(h){
      if(!h.reachableVia)return;
      var parent=S.targets.find(function(x){return String(x.id)===String(h.reachableVia);});
      if(!parent)return;
      var pp=positions[parent.id];var cp=positions[h.id];
      if(!pp||!cp)return;
      var owned=parent.status==='root'||parent.status==='da';
      drawLine(pp.x+NODE_W/2,pp.y+NODE_H,cp.x+NODE_W/2,cp.y,owned,h.pivotMethod||null);
    });
  }
  svg.innerHTML=svgContent;
  canvas.appendChild(svg);

  // Attacker node HTML
  var atkEl=document.createElement('div');
  atkEl.className='mp-node';
  atkEl.style.cssText='position:absolute;left:'+attackerX+'px;top:'+attackerY+'px;width:'+NODE_W+'px;text-align:center';
  atkEl.innerHTML='<div class="mp-icon" style="border-color:var(--accent);background:rgba(0,212,255,0.05)"><svg viewBox="0 0 32 32" width="24" height="24"><rect x="6" y="4" width="20" height="14" rx="2" fill="none" stroke="var(--accent)" stroke-width="2"/><line x1="16" y1="18" x2="16" y2="22" stroke="var(--accent)" stroke-width="2"/><line x1="10" y1="22" x2="22" y2="22" stroke="var(--accent)" stroke-width="2"/></svg></div><div class="mp-name">ATTACKER</div><div class="mp-ip">'+(S.myip||'?.?.?.?')+'</div>';
  canvas.appendChild(atkEl);

  // Host nodes
  var statusMap={'not-started':'','recon':'mp-scanning','foothold':'mp-foothold','user':'mp-foothold','root':'mp-rooted','da':'mp-rooted'};
  var mapOsIcons={linux:'<svg viewBox="0 0 36 36" width="28" height="28"><ellipse cx="18" cy="20" rx="10" ry="12" fill="#333"/><ellipse cx="18" cy="21" rx="7.5" ry="9" fill="#e8e8e8"/><circle cx="18" cy="10" r="7.5" fill="#333"/><circle cx="15" cy="9" r="1.3" fill="#fff"/><circle cx="21" cy="9" r="1.3" fill="#fff"/><circle cx="15" cy="9" r="0.6" fill="#000"/><circle cx="21" cy="9" r="0.6" fill="#000"/><path d="M16.5 12.5 Q18 14 19.5 12.5" fill="#f4a123" stroke="#c47b15" stroke-width="0.5"/><ellipse cx="12" cy="28" rx="3" ry="2.5" fill="#f4a123"/><ellipse cx="24" cy="28" rx="3" ry="2.5" fill="#f4a123"/></svg>',
  windows:'<svg viewBox="0 0 32 32" width="28" height="28"><path d="M3 7.5 L14.5 5.8 V15.2 H3 Z" fill="#0078d4"/><path d="M15.8 5.6 L29 3.5 V15.2 H15.8 Z" fill="#0078d4"/><path d="M3 16.8 L14.5 16.8 V26.2 L3 24.5 Z" fill="#0078d4"/><path d="M15.8 16.8 L29 16.8 V28.5 L15.8 26.4 Z" fill="#0078d4"/></svg>'};

  S.targets.forEach(function(h){
    var p=positions[h.id];if(!p)return;
    var el=document.createElement('div');
    var stClass=statusMap[h.status]||'';
    var badge=h.type==='dc'?'<span class="mp-badge dc">DC</span>':h.type==='ad'?'<span class="mp-badge">AD</span>':'';
    el.className='mp-node '+stClass;
    el.style.cssText='position:absolute;left:'+p.x+'px;top:'+p.y+'px;width:'+NODE_W+'px;text-align:center';
    el.innerHTML='<div class="mp-icon">'+(mapOsIcons[h.os]||mapOsIcons.linux)+badge+'</div><div class="mp-name">'+esc(h.hostname||h.name||'?')+'</div><div class="mp-ip">'+(h.ip||'no IP')+'</div>';
    canvas.appendChild(el);
  });

  body.appendChild(canvas);
}

// ===== CREDS VAULT =====
var creds=JSON.parse(localStorage.getItem('penmap-creds')||'[]');

function saveCreds(){localStorage.setItem('penmap-creds',JSON.stringify(creds));updateCredsCount();}
function updateCredsCount(){var el=document.getElementById('credsCount');if(el)el.textContent=creds.length;}

function renderCreds(){
  var tbody=document.getElementById('credsBody');
  if(!tbody)return;
  tbody.innerHTML='';
  creds.forEach(function(c,i){
    var tr=document.createElement('tr');
    tr.innerHTML='<td><input value="'+esc(c.source||'')+'" onchange="creds['+i+'].source=this.value;saveCreds()" placeholder="source"></td>'+
      '<td><input value="'+esc(c.user||'')+'" onchange="creds['+i+'].user=this.value;saveCreds()" placeholder="username"></td>'+
      '<td><input value="'+esc(c.pass||'')+'" onchange="creds['+i+'].pass=this.value;saveCreds()" placeholder="password/hash"></td>'+
      '<td style="white-space:nowrap"><button class="cred-copy-btn" onclick="copyCred('+i+')">Copy</button><button class="cred-del-btn" onclick="delCred('+i+')">&times;</button></td>';
    tbody.appendChild(tr);
  });
  updateCredsCount();
}
function addCred(source,user,pass){
  creds.push({source:source||'',user:user||'',pass:pass||''});
  saveCreds();renderCreds();
}
function delCred(i){creds.splice(i,1);saveCreds();renderCreds();}
function clearCreds(){if(!confirm('Clear all credentials?'))return;creds=[];saveCreds();renderCreds();}
function copyCred(i){var c=creds[i];navigator.clipboard.writeText((c.user||'')+(c.pass?':'+c.pass:'')).then(function(){});}

function autoCollectCred(credsFound,source){
  if(!credsFound)return;
  // Try to parse user:pass format
  var parts=credsFound.split(':');
  var user=parts[0]||'';
  var pass=parts.slice(1).join(':')||'';
  // Check if already exists
  var exists=creds.some(function(c){return c.user===user&&c.pass===pass&&c.source===source;});
  if(!exists){creds.push({source:source,user:user,pass:pass});saveCreds();renderCreds();}
}

function switchNotesTab(tab){

  }
}

// ===== EXPORT MAP PNG =====
function exportMapPNG(){
  var mpCanvas=document.querySelector('.mp-canvas');
  if(!mpCanvas){alert('No map to export. Add targets first.');return;}
  var w=parseInt(mpCanvas.style.width)||600;
  var h=parseInt(mpCanvas.style.height)||400;
  var pad=20;
  var svgNS='http://www.w3.org/2000/svg';
  var expSvg=document.createElementNS(svgNS,'svg');
  var totalW=w+pad*2, totalH=h+pad*2;
  expSvg.setAttribute('width',totalW);
  expSvg.setAttribute('height',totalH);
  expSvg.setAttribute('xmlns',svgNS);

  // Background
  var bg=document.createElementNS(svgNS,'rect');
  bg.setAttribute('width','100%');bg.setAttribute('height','100%');bg.setAttribute('fill','#0a0e17');
  expSvg.appendChild(bg);

  // Copy SVG content (connections, zones)
  var origSvg=document.getElementById('mapPanelSvg');
  var g=document.createElementNS(svgNS,'g');
  g.setAttribute('transform','translate('+pad+','+pad+')');
  g.innerHTML=origSvg.innerHTML;
  expSvg.appendChild(g);

  // Render HTML nodes as pure SVG (text + rects, no foreignObject)
  mpCanvas.querySelectorAll('.mp-node').forEach(function(node){
    var left=(parseInt(node.style.left)||0)+pad;
    var top=(parseInt(node.style.top)||0)+pad;
    var nw=parseInt(node.style.width)||110;
    var ng=document.createElementNS(svgNS,'g');
    ng.setAttribute('transform','translate('+left+','+top+')');

    // Icon box
    var iconRect=document.createElementNS(svgNS,'rect');
    var borderColor='#1e3a5f';
    var fillColor='#111827';
    if(node.classList.contains('mp-rooted')){borderColor='#10b981';}
    else if(node.classList.contains('mp-foothold')){borderColor='#f59e0b';}
    else if(node.classList.contains('mp-scanning')){borderColor='#fbbf24';}
    if(node.querySelector('.mp-icon[style*="accent"]')){borderColor='#00d4ff';fillColor='rgba(0,212,255,0.05)';}
    iconRect.setAttribute('x',(nw-56)/2);iconRect.setAttribute('y','0');
    iconRect.setAttribute('width','56');iconRect.setAttribute('height','56');
    iconRect.setAttribute('rx','8');
    iconRect.setAttribute('fill',fillColor);iconRect.setAttribute('stroke',borderColor);iconRect.setAttribute('stroke-width','2');
    ng.appendChild(iconRect);

    // OS icon inside box
    var iconEl=node.querySelector('.mp-icon svg');
    if(iconEl){
      var iconClone=iconEl.cloneNode(true);
      iconClone.setAttribute('x',String((nw-24)/2));iconClone.setAttribute('y','16');
      iconClone.setAttribute('width','24');iconClone.setAttribute('height','24');
      ng.appendChild(iconClone);
    }

    // Badge
    var badgeEl=node.querySelector('.mp-badge');
    if(badgeEl){
      var badgeColor=badgeEl.classList.contains('dc')?'#ef4444':'#7c3aed';
      var br=document.createElementNS(svgNS,'rect');
      br.setAttribute('x',String((nw+56)/2-16));br.setAttribute('y','-3');
      br.setAttribute('width','18');br.setAttribute('height','13');br.setAttribute('rx','3');
      br.setAttribute('fill',badgeColor);
      ng.appendChild(br);
      var bt=document.createElementNS(svgNS,'text');
      bt.setAttribute('x',String((nw+56)/2-7));bt.setAttribute('y','7');
      bt.setAttribute('text-anchor','middle');bt.setAttribute('fill','#fff');
      bt.setAttribute('font-size','8');bt.setAttribute('font-family','sans-serif');bt.setAttribute('font-weight','bold');
      bt.textContent=badgeEl.textContent;
      ng.appendChild(bt);
    }

    // Name
    var nameEl=node.querySelector('.mp-name');
    if(nameEl){
      var nt=document.createElementNS(svgNS,'text');
      nt.setAttribute('x',String(nw/2));nt.setAttribute('y','68');
      nt.setAttribute('text-anchor','middle');nt.setAttribute('fill','#f8fafc');
      nt.setAttribute('font-size','10');nt.setAttribute('font-weight','bold');nt.setAttribute('font-family','sans-serif');
      nt.textContent=nameEl.textContent;
      ng.appendChild(nt);
    }

    // IP
    var ipEl=node.querySelector('.mp-ip');
    if(ipEl){
      var it=document.createElementNS(svgNS,'text');
      it.setAttribute('x',String(nw/2));it.setAttribute('y','80');
      it.setAttribute('text-anchor','middle');it.setAttribute('fill','#64748b');
      it.setAttribute('font-size','9');it.setAttribute('font-family','monospace');
      it.textContent=ipEl.textContent;
      ng.appendChild(it);
    }

    expSvg.appendChild(ng);
  });

  // Replace CSS variables in SVG content
  var serializer=new XMLSerializer();
  var svgStr=serializer.serializeToString(expSvg);
  svgStr=svgStr.replace(/var\(--accent\)/g,'#00d4ff').replace(/var\(--green\)/g,'#10b981')
    .replace(/var\(--red\)/g,'#ef4444').replace(/var\(--orange\)/g,'#f59e0b')
    .replace(/var\(--yellow\)/g,'#fbbf24').replace(/var\(--muted\)/g,'#64748b')
    .replace(/var\(--white\)/g,'#f8fafc').replace(/var\(--border\)/g,'#1e3a5f')
    .replace(/var\(--surface\)/g,'#111827').replace(/var\(--surface2\)/g,'#1a2332')
    .replace(/var\(--accent2\)/g,'#7c3aed').replace(/var\(--bg\)/g,'#0a0e17');

  var img=new Image();
  img.onload=function(){
    var c2=document.createElement('canvas');
    c2.width=totalW*2;c2.height=totalH*2;
    var ctx=c2.getContext('2d');
    ctx.scale(2,2);
    ctx.drawImage(img,0,0,totalW,totalH);
    var a=document.createElement('a');
    a.download='attack-map-'+(S.ip||'export')+'.png';
    a.href=c2.toDataURL('image/png');
    a.click();
  };
  img.onerror=function(){
    // Fallback: download as SVG
    var blob=new Blob([svgStr],{type:'image/svg+xml'});
    var a=document.createElement('a');
    a.download='attack-map-'+(S.ip||'export')+'.svg';
    a.href=URL.createObjectURL(blob);
    a.click();
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgStr)));
}

// ===== TIMER =====
var timerInterval=null;
var timerSeconds=parseInt(localStorage.getItem('penmap-timer')||'0');
var timerRunning=false;

function formatTime(s){
  var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);var sec=s%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function updateTimerDisplay(){document.getElementById('timerDisplay').textContent=formatTime(timerSeconds);}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('timerBtn').textContent='Start';
  } else {
    timerRunning=true;
    document.getElementById('timerBtn').textContent='Pause';
    timerInterval=setInterval(function(){
      timerSeconds++;localStorage.setItem('penmap-timer',timerSeconds);updateTimerDisplay();
    },1000);
  }
}
function resetTimer(){
  clearInterval(timerInterval);timerRunning=false;timerSeconds=0;
  localStorage.setItem('penmap-timer','0');updateTimerDisplay();
  document.getElementById('timerBtn').textContent='Start';
}
updateTimerDisplay();

// ===== INIT =====
load();
handleHash();
renderSidebar();
render();
renderCreds();
</script>
<script data-goatcounter="https://penmap.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<script>
  const gcPaths = [location.pathname, "/penmap.html", "/"].map(p => encodeURIComponent(p || "/"));
  (async () => {
    const el = document.getElementById("pm-views");
    for (const p of gcPaths) {
      try {
        const r = await fetch(`https://penmap.goatcounter.com/counter/${p}.json`);
        if (!r.ok) continue;
        const d = await r.json();
        if (d && d.count && d.count !== "0") { el.textContent = d.count + " views"; return; }
      } catch (_) {}
    }
  })();
</script>
